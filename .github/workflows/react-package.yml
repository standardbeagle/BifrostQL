name: React Package

on:
  push:
    branches: [main]
    paths:
      - 'packages/@bifrostql/react/**'
      - '.github/workflows/react-package.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/@bifrostql/react/**'
      - '.github/workflows/react-package.yml'

# Opt JavaScript-based actions into Node.js 24 ahead of the 2026-09-16
# Node.js 20 sunset.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --dir packages/@bifrostql/types build

      - name: Lint
        run: pnpm --dir packages/@bifrostql/react lint

      - name: Format check
        run: pnpm --dir packages/@bifrostql/react format

      - name: Typecheck
        run: pnpm --dir packages/@bifrostql/react typecheck

      - name: Test with coverage
        run: pnpm --dir packages/@bifrostql/react test:coverage

      - name: Build
        run: pnpm --dir packages/@bifrostql/react build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/@bifrostql/react/coverage/
          retention-days: 14
