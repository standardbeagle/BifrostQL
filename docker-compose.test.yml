services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bifrost-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Bifrost!CI!Test1234"
    ports:
      - "1433:1433"
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Bifrost!CI!Test1234' -No -Q 'SELECT 1'
        || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Bifrost!CI!Test1234' -Q 'SELECT 1'
        || exit 1
      interval: 5s
      retries: 30
      start_period: 30s

  postgres:
    image: postgres:16
    container_name: bifrost-pg
    environment:
      POSTGRES_PASSWORD: bifrost_ci_test
      POSTGRES_DB: bifrost_ci
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 20
      start_period: 10s

  mysql:
    image: mysql:8.4
    container_name: bifrost-mysql
    environment:
      MYSQL_ROOT_PASSWORD: bifrost_ci_test
      MYSQL_DATABASE: bifrost_ci
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -pbifrost_ci_test"]
      interval: 5s
      retries: 30
      start_period: 30s
