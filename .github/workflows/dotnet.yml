# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x
      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release
      - name: Test Core
        run: dotnet test tests/BifrostQL.Core.Test/BifrostQL.Core.Test.csproj --no-build --verbosity normal --configuration Release
      - name: Test Server
        run: dotnet test tests/BifrostQL.Server.Test/BifrostQL.Server.Test.csproj --no-build --verbosity normal --configuration Release
      - name: Pack
        run: |
          dotnet pack "src/BifrostQL.Core/BifrostQL.Core.csproj"  --configuration Release --no-build -p:PackageVersion=0.4.${{ github.run_number }} 
          dotnet pack "src/BifrostQL.Server/BifrostQL.Server.csproj"  --configuration Release --no-build -p:PackageVersion=0.4.${{ github.run_number }} 
          dotnet pack "src/data/BifrostQL.Ngsql/BifrostQL.Ngsql.csproj"  --configuration Release --no-build -p:PackageVersion=0.4.${{ github.run_number }} 
          dotnet pack "src/data/BifrostQL.SqlServer/BifrostQL.SqlServer.csproj"  --configuration Release --no-build -p:PackageVersion=0.4.${{ github.run_number }} 
          dotnet pack "src/data/BifrostQL.Sqlite/BifrostQL.Sqlite.csproj"  --configuration Release --no-build -p:PackageVersion=0.4.${{ github.run_number }} 
          dotnet pack "src/data/BifrostQL.MySql/BifrostQL.MySql.csproj"  --configuration Release --no-build -p:PackageVersion=0.4.${{ github.run_number }} 
      - name: add source
        run: dotnet nuget add source --username standardbeagle --password ${{secrets.REPO_NUGET}} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/standardbeagle/index.json"
      - name: publish Core to repo
        run: dotnet nuget push "src/BifrostQL.Core/bin/Release/*.nupkg" --source "github" -k ${{secrets.REPO_NUGET}} --skip-duplicate
      - name: publish Server to repo
        run: dotnet nuget push "src/BifrostQL.Server/bin/Release/*.nupkg" --source "github" -k ${{secrets.REPO_NUGET}} --skip-duplicate
      - name: publish Ngsql to repo
        run: dotnet nuget push "src/data/BifrostQL.Ngsql/bin/Release/*.nupkg" --source "github" -k ${{secrets.REPO_NUGET}} --skip-duplicate
      - name: publish SqlServer to repo
        run: dotnet nuget push "src/data/BifrostQL.SqlServer/bin/Release/*.nupkg" --source "github" -k ${{secrets.REPO_NUGET}} --skip-duplicate
      - name: publish Sqlite to repo
        run: dotnet nuget push "src/data/BifrostQL.Sqlite/bin/Release/*.nupkg" --source "github" -k ${{secrets.REPO_NUGET}} --skip-duplicate
      - name: publish MySql to repo
        run: dotnet nuget push "src/data/BifrostQL.MySql/bin/Release/*.nupkg" --source "github" -k ${{secrets.REPO_NUGET}} --skip-duplicate
      - name: publish Core to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        continue-on-error: true
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push "src/BifrostQL.Core/bin/Release/*.nupkg" --source "nuget.org" -k "$NUGET_API_KEY" --skip-duplicate
          else
            echo "Skipping nuget.org publish: NUGET_API_KEY not set"
          fi
      - name: publish Server to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        continue-on-error: true
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push "src/BifrostQL.Server/bin/Release/*.nupkg" --source "nuget.org" -k "$NUGET_API_KEY" --skip-duplicate
          else
            echo "Skipping nuget.org publish: NUGET_API_KEY not set"
          fi
      - name: publish Ngsql to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        continue-on-error: true
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push "src/data/BifrostQL.Ngsql/bin/Release/*.nupkg" --source "nuget.org" -k "$NUGET_API_KEY" --skip-duplicate
          else
            echo "Skipping nuget.org publish: NUGET_API_KEY not set"
          fi
      - name: publish SqlServer to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        continue-on-error: true
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push "src/data/BifrostQL.SqlServer/bin/Release/*.nupkg" --source "nuget.org" -k "$NUGET_API_KEY" --skip-duplicate
          else
            echo "Skipping nuget.org publish: NUGET_API_KEY not set"
          fi
      - name: publish Sqlite to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        continue-on-error: true
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push "src/data/BifrostQL.Sqlite/bin/Release/*.nupkg" --source "nuget.org" -k "$NUGET_API_KEY" --skip-duplicate
          else
            echo "Skipping nuget.org publish: NUGET_API_KEY not set"
          fi
      - name: publish MySql to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        continue-on-error: true
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push "src/data/BifrostQL.MySql/bin/Release/*.nupkg" --source "nuget.org" -k "$NUGET_API_KEY" --skip-duplicate
          else
            echo "Skipping nuget.org publish: NUGET_API_KEY not set"
          fi
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: examples/edit-db/pnpm-lock.yaml
      - name: set editor version
        working-directory: ./examples/edit-db
        run: npm version 0.4.${{ github.run_number }}
      - name: install editor
        working-directory: ./examples/edit-db
        run: pnpm install --frozen-lockfile
      - name: build editor
        working-directory: ./examples/edit-db
        run: pnpm run build
      - name: publish npm package
        working-directory: ./examples/edit-db
        run: |
          echo "//registry.npmjs.org/:_authToken=${{secrets.NPM_TOKEN}}" > ~/.npmrc
          npm publish --access public
